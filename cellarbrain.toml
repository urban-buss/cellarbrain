# --- ETL Defaults -----------------------------------------------------------
[etl]
default_mode = "full"
etl_fence_start = "<!-- source: etl — do not edit below this line -->"
etl_fence_end = "<!-- source: etl — end -->"

# --- Search Synonyms --------------------------------------------------------
# Maps query tokens to stored-data equivalents for multi-language search.
# Built-in defaults cover ~82 DE→EN/stored mappings (countries, grapes, etc.).
# TOML entries merge with defaults — add overrides or new terms here.
# Agents can also manage custom synonyms at runtime via the search_synonyms tool.
[search.synonyms]
# Examples (already in defaults):
# schweiz = "Switzerland"         # DE country → stored value
# rotwein = "red"                 # DE category → stored category
# spätburgunder = "Pinot Noir"   # DE grape → international name
# weingut = ""                    # stopword (empty string → token dropped)

# --- Currency Normalisation -------------------------------------------------
# All prices are normalised to the default currency for aggregation.
# Exchange rates: 1 unit of foreign currency = X units of default currency.
# Rates are fixed (not live). Update manually when needed.
[currency]
default = "CHF"

[currency.rates]
EUR = 0.93
USD = 0.88
GBP = 1.11
AUD = 0.56
CAD = 0.62
RON = 0.19

# --- Sommelier (AI Food-Wine Pairing) --------------------------------------
# Requires optional dependencies: pip install cellarbrain[sommelier]
# [sommelier]
# enabled = false                          # enable sommelier features
# model_dir = "models/sommelier/model"     # trained model weights directory
# base_model = "models/sommelier/base-model"  # local path to base model
# food_catalogue = "models/sommelier/food_catalogue.parquet"
# pairing_dataset = "models/sommelier/pairing_dataset.parquet"
# food_index = "models/sommelier/food.index"
# food_ids = "models/sommelier/food_ids.json"
# wine_index_dir = "sommelier"             # subdir under data_dir for wine index
# default_limit = 10                       # default result count
# min_score = 0.0                          # minimum similarity threshold
# training_epochs = 10                     # fine-tuning epochs
# training_batch_size = 32                 # training batch size
# warmup_ratio = 0.1                       # warmup fraction of training steps
# eval_split = 0.1                         # hold-out fraction for evaluation
