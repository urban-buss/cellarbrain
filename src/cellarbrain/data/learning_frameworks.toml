# ── Bordeaux ────────────────────────────────────────────────────────
[bordeaux]
name = "Bordeaux (Left & Right Bank)"
match_regions = ["Bordeaux"]
match_country = "France"
description = "The world's most famous blended reds — Cabernet vs. Merlot, terroir vs. château"
key_grapes = ["Cabernet Sauvignon", "Merlot", "Cabernet Franc"]

[[bordeaux.levels]]
level = 1
name = "Regional & Supérieur"
description = "Entry-level Bordeaux and Bordeaux Supérieur"
match_classifications = []
match_subregions = []
match_subregion_contains = "Bordeaux"
key_lesson = "The regional benchmark — what does 'Bordeaux' taste like before appellations complicate things?"
contrast_prompt = "Notice the classic blend structure: Cabernet tannin + Merlot softness + cedar and dark fruit"

[[bordeaux.levels]]
level = 2
name = "Appellation Communale"
description = "Named commune wines — Médoc, Saint-Émilion, Pomerol, Graves"
match_classifications = []
match_subregions = [
    "Haut-Médoc", "Margaux", "Saint-Julien", "Pauillac", "Saint-Estèphe",
    "Pessac-Léognan", "Graves",
    "Saint-Émilion", "Pomerol", "Fronsac",
    "Sauternes", "Barsac",
]
match_subregion_contains = ""
key_lesson = "Left Bank (Cabernet-dominant, gravel) vs. Right Bank (Merlot-dominant, clay/limestone)"
contrast_prompt = "Compare a Pauillac with a Saint-Émilion — feel how the dominant grape changes the wine's personality"

[[bordeaux.levels]]
level = 3
name = "Cru Classé"
description = "Classified growths — the 1855 hierarchy and Saint-Émilion classifications"
match_classifications = [
    "1er Grand Cru Classé", "1er Grand Cru Classé A",
