    "1er Grand Cru Classé", "1er Grand Cru Classé A",
    "1er Cru Supérieur",
]
match_subregions = []
match_subregion_contains = ""
key_lesson = "Legendary terroir + meticulous winemaking — the ultimate expression of Bordeaux"
contrast_prompt = "Precision, complexity, and incredible length — what separates a First Growth from a Fifth?"


