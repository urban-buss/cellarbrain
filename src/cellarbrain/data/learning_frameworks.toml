# Learning Frameworks — pedagogical hierarchies for wine education
#
# Each top-level key defines a framework.  The tool matches a user's
# topic string against ``match_regions`` / ``match_country`` (case-
# insensitive).  When no curated framework matches, the engine falls
# back to data-driven hierarchy inference from the cellar contents.
#
# Level numbering starts at 1 (entry-level) and increases toward the
# pinnacle of the hierarchy.  ``match_classifications`` and
# ``match_subregions`` are lists matched against the ``classification``
# and ``subregion`` columns of ``wines_full``.

# ── Burgundy ────────────────────────────────────────────────────────
[burgundy]
name = "Burgundy (Côte d'Or)"
match_regions = ["Burgundy"]
match_country = "France"
description = "The world's benchmark for terroir-driven Pinot Noir & Chardonnay"
key_grapes = ["Pinot Noir", "Chardonnay"]

[[burgundy.levels]]
level = 1
name = "Regional (Bourgogne)"
description = "Broad regional blends — the entry point"
match_classifications = []
match_subregions = []
match_subregion_contains = "Bourgogne"
key_lesson = "Set the baseline: pure Pinot/Chardonnay without village character"
contrast_prompt = "Notice the simplicity — this is your reference point for what village terroir adds"

[[burgundy.levels]]
level = 2
name = "Village"
description = "Named village wines — each with distinct personality"
match_classifications = []
match_subregions = [
    "Gevrey-Chambertin", "Chambolle-Musigny", "Morey-Saint-Denis",
    "Vosne-Romanée", "Nuits-Saint-Georges",
    "Pommard", "Volnay", "Beaune",
    "Meursault", "Puligny-Montrachet", "Chassagne-Montrachet",
    "Marsannay", "Fixin", "Santenay",
]
match_subregion_contains = ""
key_lesson = "Each village has a signature — compare structure (north) vs. elegance (south)"
contrast_prompt = "Compare tannin texture and fruit profile between villages"

[[burgundy.levels]]
level = 3
name = "Premier Cru"
description = "Named vineyard sites of recognised quality"
match_classifications = ["1er Cru"]
match_subregions = []
match_subregion_contains = ""
key_lesson = "A single vineyard speaks louder than a village — notice the precision"
contrast_prompt = "How does a Premier Cru differ from its village counterpart? More concentrated? More complex? Different fruit profile?"

[[burgundy.levels]]
level = 4
name = "Grand Cru"
description = "The pinnacle — individual vineyards of exceptional terroir"
match_classifications = ["Grand Cru"]
match_subregions = []
match_subregion_contains = ""
key_lesson = "Power and finesse combined — why these few hectares command the highest prices"
contrast_prompt = "Intensity without heaviness — can you feel the mineral backbone that distinguishes Grand Cru?"


