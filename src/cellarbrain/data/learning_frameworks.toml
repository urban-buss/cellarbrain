    "4ème Grand Cru Classé", "5ème Grand Cru Classé",
    "Grand Cru Classé", "Cru Classé",
    "Cru Bourgeois", "Cru Bourgeois Supérieur", "Cru Bourgeois Exceptionnel",
]
match_subregions = []
match_subregion_contains = ""
key_lesson = "Classification reflects terroir potential and winemaking investment — what changes at this level?"
contrast_prompt = "More depth, more new oak influence, longer finish — how does classification translate to the glass?"

[[bordeaux.levels]]
level = 4
name = "First Growths & Top Estates"
description = "The pinnacle — Premiers Grands Crus Classés and iconic properties"
